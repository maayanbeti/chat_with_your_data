<title>Flight Data AI — What Testing Taught Us</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --surface-1:  #17181c;
    --surface-2:  #1f2127;
    --page-plane: #0b0c0f;
    --text-primary: #ffffff;
    --text-secondary: #c3c2b7;
    --text-muted: #7c7d84;
    --border: rgba(255,255,255,0.10);
    --s-blue: #3987e5;
    --s-yellow: #c98500;
    --good: #1ec91e;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: var(--page-plane);
    color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    overflow: hidden;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(circle at 25% 15%, rgba(57,135,229,0.16), transparent 45%),
      radial-gradient(circle at 80% 85%, rgba(216,89,38,0.12), transparent 45%),
      var(--page-plane);
  }
  .stage {
    position: relative;
    width: min(94vw, 920px);
    aspect-ratio: 16 / 9.6;
    background: var(--surface-1);
    border-radius: 18px;
    border: 1px solid var(--border);
    box-shadow: 0 40px 100px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.03);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .chrome {
    position: absolute; top: 0; left: 0; right: 0; height: 40px;
    display: flex; align-items: center; gap: 8px; padding: 0 14px;
    background: var(--surface-2); border-bottom: 1px solid var(--border);
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.r { background: #e34948; } .dot.y { background: #eda100; } .dot.g { background: #1baf7a; }
  .chrome .url {
    margin-left: 12px; font-size: 12px; color: var(--text-muted);
    background: rgba(255,255,255,0.05); padding: 4px 12px; border-radius: 6px;
  }

  .scene {
    position: absolute; inset: 40px 0 0 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .5s ease;
    text-align: center; padding: 0 60px;
  }
  .scene.show { opacity: 1; }

  .eyebrow { font-size: 12px; letter-spacing: 0.18em; color: var(--s-blue); font-weight: 700; margin-bottom: 14px; }
  .title { font-family: Georgia, "Times New Roman", serif; font-size: 32px; font-weight: 700; margin-bottom: 10px; line-height: 1.25; }
  .sub { font-size: 15px; color: var(--text-secondary); font-style: italic; }

  .shot-wrap { position: relative; display: inline-block; margin-bottom: 22px; }
  .shot-wrap img { display: block; border-radius: 10px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
  .ring-svg {
    position: absolute; inset: -18px -24px; width: calc(100% + 48px); height: calc(100% + 36px);
    overflow: visible; pointer-events: none;
  }
  .ring-svg ellipse {
    fill: none; stroke: var(--s-yellow); stroke-width: 4;
    stroke-dasharray: 100; stroke-dashoffset: 100;
    animation: ringDraw 1s ease forwards 0.4s;
  }
  @keyframes ringDraw { to { stroke-dashoffset: 0; } }
  .caption { font-size: 16px; color: var(--text-secondary); max-width: 620px; line-height: 1.55; }
  .caption strong { color: var(--text-primary); }

  .progress { position: absolute; bottom: 14px; left: 0; right: 0; display: flex; justify-content: center; gap: 8px; }
  .progress .d { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: background .2s, transform .2s; }
  .progress .d.active { background: var(--s-blue); transform: scale(1.3); }

  .hint {
    position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
    font-size: 12.5px; color: var(--text-muted); text-align: center; max-width: 620px;
  }
</style>

  <div class="chrome">

    <div class="url">flight-assistant.app · qa-results</div>
  </div>
  <div class="scene" id="scene"></div>
  <div class="progress" id="progress"></div>
</div>

function setProgress(idx) {
  const wrap = $("progress");
  wrap.innerHTML = "";
  SCENES.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "d" + (i === idx ? " active" : "");
    wrap.appendChild(d);
  });
}

async function playOnce() {
  const scene = $("scene");
  for (let i = 0; i < SCENES.length; i++) {
    setProgress(i);
    scene.innerHTML = SCENES[i].html;
    scene.classList.remove("show");
    void scene.offsetWidth;
    scene.classList.add("show");
    await sleep(SCENES[i].hold);
    scene.classList.remove("show");
    await sleep(400);
  }
  window.__demoDone = true;
}

window.__demoDone = false;
